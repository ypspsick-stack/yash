<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ping Pong Game</title>
<style>
    body {
        margin: 0;
        background: #111;
        color: white;
        font-family: Arial, sans-serif;
        text-align: center;
    }

    h1 { margin: 10px; }

    canvas {
        background: black;
        display: block;
        margin: 20px auto;
        border: 3px solid white;
    }

    select {
        padding: 5px;
        margin-top: 10px;
    }
</style>
</head>

<body>

<h1>🏓 Ping Pong Game</h1>

<div>
    <label>Difficulty: </label>
    <select id="difficulty" onchange="setDifficulty()">
        <option value="easy">Easy</option>
        <option value="medium" selected>Medium</option>
        <option value="hard">Hard</option>
    </select>
</div>

<canvas id="gameCanvas" width="800" height="400"></canvas>
<p>Hold ↑ and ↓ keys to move</p>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// Paddle
const paddleWidth = 10;
const paddleHeight = 100;

// Player & CPU
let playerY = canvas.height/2 - paddleHeight/2;
let cpuY = canvas.height/2 - paddleHeight/2;

// Ball
let ballX = canvas.width/2;
let ballY = canvas.height/2;
let ballRadius = 8;

let ballSpeedX = 5;
let ballSpeedY = 4;

// Difficulty variables
let cpuSpeed = 0.1;
let maxCpuMove = 6;

// Score
let playerScore = 0;
let cpuScore = 0;

// Controls
let upPressed = false;
let downPressed = false;

// Difficulty setup
function setDifficulty() {
    let level = document.getElementById("difficulty").value;

    let newX, newY;

    if (level === "easy") {
        newX = 3; newY = 2;
        cpuSpeed = 0.05;
        maxCpuMove = 4;
    }
    else if (level === "medium") {
        newX = 5; newY = 4;
        cpuSpeed = 0.1;
        maxCpuMove = 6;
    }
    else {
        newX = 7; newY = 6;
        cpuSpeed = 0.18;
        maxCpuMove = 8;
    }

    // keep direction, change speed
    ballSpeedX = Math.sign(ballSpeedX) * newX;
    ballSpeedY = Math.sign(ballSpeedY) * newY;
}

// Draw
function draw() {
    ctx.fillStyle = "black";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // Net
    ctx.fillStyle = "white";
    for (let i=0;i<canvas.height;i+=20) {
        ctx.fillRect(canvas.width/2 -1,i,2,10);
    }

    // Paddles
    ctx.fillRect(0, playerY, paddleWidth, paddleHeight);
    ctx.fillRect(canvas.width-paddleWidth, cpuY, paddleWidth, paddleHeight);

    // Ball
    ctx.beginPath();
    ctx.arc(ballX, ballY, ballRadius, 0, Math.PI*2);
    ctx.fill();

    // Score
    ctx.font = "20px Arial";
    ctx.fillText(playerScore, canvas.width/4, 30);
    ctx.fillText(cpuScore, canvas.width*3/4, 30);
}

// Update
function update() {

    // Player movement
    if (upPressed) playerY -= 6;
    if (downPressed) playerY += 6;

    // Ball movement
    ballX += ballSpeedX;
    ballY += ballSpeedY;

    // Top/bottom bounce (fixed)
    if (ballY - ballRadius < 0 || ballY + ballRadius > canvas.height) {
        ballSpeedY = -ballSpeedY;
    }

    // Player collision
    if (ballX - ballRadius < paddleWidth) {
        if (ballY > playerY && ballY < playerY + paddleHeight) {
            ballSpeedX = -ballSpeedX;
        } else {
            cpuScore++;
            resetBall();
        }
    }

    // CPU collision
    if (ballX + ballRadius > canvas.width - paddleWidth) {
        if (ballY > cpuY && ballY < cpuY + paddleHeight) {
            ballSpeedX = -ballSpeedX;
        } else {
            playerScore++;
            resetBall();
        }
    }

    // CPU AI (limited movement)
    let target = ballY - (cpuY + paddleHeight/2);
    let move = Math.sign(target) * Math.min(Math.abs(target), maxCpuMove * cpuSpeed);
    cpuY += move;

    // Keep inside
    playerY = Math.max(0, Math.min(canvas.height - paddleHeight, playerY));
    cpuY = Math.max(0, Math.min(canvas.height - paddleHeight, cpuY));

    // Win condition
    if (playerScore === 10) {
        alert("You Win!");
        location.reload();
    }
    if (cpuScore === 10) {
        alert("CPU Wins!");
        location.reload();
    }
}

// Reset ball
function resetBall() {
    ballX = canvas.width/2;
    ballY = canvas.height/2;
    ballSpeedX = -ballSpeedX;
}

// Controls
document.addEventListener("keydown", e => {
    if (e.key === "ArrowUp") upPressed = true;
    if (e.key === "ArrowDown") downPressed = true;
});

document.addEventListener("keyup", e => {
    if (e.key === "ArrowUp") upPressed = false;
    if (e.key === "ArrowDown") downPressed = false;
});

// Loop
function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

// Start
setDifficulty();
gameLoop();
</script>

</body>
</html>
