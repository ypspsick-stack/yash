```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Ping Pong</title>
<style>
body {
    margin: 0;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
}

h1 {
    margin-top: 15px;
}

canvas {
    display: block;
    margin: 20px auto;
    border: 4px solid white;
    box-shadow: 0 0 25px cyan;
    background: rgba(0,0,0,0.35);
}

button, select {
    padding: 12px 22px;
    margin: 10px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
}

button {
    cursor: pointer;
    background: cyan;
    color: black;
    font-weight: bold;
    box-shadow: 0 0 12px cyan;
}

button:hover {
    transform: scale(1.05);
}

.hidden {
    display: none;
}

#scoreboard {
    font-size: 24px;
    margin-top: 10px;
}

#highScoreDisplay {
    margin-top: 10px;
    font-size: 20px;
    color: cyan;
}

#message {
    font-size: 30px;
    margin-top: 15px;
}
</style>
</head>
<body>

<h1>🏓 Ultimate Ping Pong</h1>

<div id="menu">
    <label for="difficulty">Difficulty:</label>
    <select id="difficulty">
        <option value="easy">Easy</option>
        <option value="medium" selected>Medium</option>
        <option value="hard">Hard</option>
        <option value="advanced">Advanced</option>
    </select>
    <br>
    <button onclick="startGame()">▶ Play Game</button>
    <div id="highScoreDisplay">🏆 High Score: <span id="highScore">0</span></div>
</div>

<canvas id="gameCanvas" class="hidden"></canvas>

<div id="scoreboard" class="hidden">
    Player: <span id="playerScore">0</span> | CPU: <span id="cpuScore">0</span>
</div>

<div id="message"></div>

<div id="gameOverScreen" class="hidden">
    <button onclick="restartGame()">🔁 Restart Game</button>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// Slightly larger board
canvas.width = window.innerWidth * 0.9;
canvas.height = window.innerHeight * 0.72;

const paddleWidth = 14;
const paddleHeight = 110;
const ballRadius = 9;

let playerY, cpuY;
let ballX, ballY;
let ballSpeedX, ballSpeedY;
let baseSpeedX = 5;
let baseSpeedY = 4;
let cpuSpeed = 0.08;

let playerScore = 0;
let cpuScore = 0;
let highScore = localStorage.getItem("pongHighScore") || 0;
document.getElementById("highScore").innerText = highScore;

let up = false;
let down = false;
let running = false;

let bounceSound = new Audio("https://www.soundjay.com/button/beep-07.wav");

function setDifficulty() {
    const level = document.getElementById("difficulty").value;

    if (level === "easy") {
        baseSpeedX = 3;
        baseSpeedY = 2;
        cpuSpeed = 0.05;
    } else if (level === "medium") {
        baseSpeedX = 5;
        baseSpeedY = 4;
        cpuSpeed = 0.08;
    } else if (level === "hard") {
        baseSpeedX = 7;
        baseSpeedY = 6;
        cpuSpeed = 0.14;
    } else if (level === "advanced") {
        baseSpeedX = 9;
        baseSpeedY = 8;
        cpuSpeed = 0.20;
    }
}

function resetBall() {
    ballX = canvas.width / 2;
    ballY = canvas.height / 2;
    ballSpeedX = (Math.random() > 0.5 ? 1 : -1) * baseSpeedX;
    ballSpeedY = (Math.random() > 0.5 ? 1 : -1) * baseSpeedY;
}

function startGame() {
    document.getElementById("menu").classList.add("hidden");
    canvas.classList.remove("hidden");
    document.getElementById("scoreboard").classList.remove("hidden");
    document.getElementById("message").innerText = "";
    document.getElementById("gameOverScreen").classList.add("hidden");

    playerScore = 0;
    cpuScore = 0;
    updateScore();

    playerY = canvas.height / 2 - paddleHeight / 2;
    cpuY = canvas.height / 2 - paddleHeight / 2;

    setDifficulty();
    resetBall();

    running = true;
    loop();
}

function restartGame() {
    startGame();
}

function updateScore() {
    document.getElementById("playerScore").innerText = playerScore;
    document.getElementById("cpuScore").innerText = cpuScore;
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Center net
    ctx.fillStyle = "rgba(255,255,255,0.3)";
    for (let i = 0; i < canvas.height; i += 28) {
        ctx.fillRect(canvas.width / 2 - 2, i, 4, 18);
    }

    // Ball glow
    ctx.fillStyle = "rgba(0,255,255,0.3)";
    ctx.beginPath();
    ctx.arc(ballX, ballY, ballRadius + 5, 0, Math.PI * 2);
    ctx.fill();

    // Ball
    ctx.fillStyle = "cyan";
    ctx.beginPath();
    ctx.arc(ballX, ballY, ballRadius, 0, Math.PI * 2);
    ctx.fill();

    // Paddles
    ctx.fillStyle = "white";
    ctx.fillRect(0, playerY, paddleWidth, paddleHeight);
    ctx.fillRect(canvas.width - paddleWidth, cpuY, paddleWidth, paddleHeight);
}

function update() {
    if (up) playerY -= 8;
    if (down) playerY += 8;

    ballX += ballSpeedX;
    ballY += ballSpeedY;

    // Wall bounce
    if (ballY - ballRadius < 0 || ballY + ballRadius > canvas.height) {
        ballSpeedY *= -1;
        bounceSound.currentTime = 0;
        bounceSound.play();
    }

    // Player collision
    if (ballX - ballRadius < paddleWidth) {
        if (ballY > playerY && ballY < playerY + paddleHeight) {
            ballSpeedX *= -1;
            bounceSound.currentTime = 0;
            bounceSound.play();
        } else {
            cpuScore++;
            updateScore();
            resetBall();
        }
    }

    // CPU collision
    if (ballX + ballRadius > canvas.width - paddleWidth) {
        if (ballY > cpuY && ballY < cpuY + paddleHeight) {
            ballSpeedX *= -1;
            bounceSound.currentTime = 0;
            bounceSound.play();
        } else {
            playerScore++;
            updateScore();
            resetBall();
        }
    }

    // Better AI
    cpuY += (ballY - (cpuY + paddleHeight / 2)) * cpuSpeed;

    // Progressive speed increase
    ballSpeedX *= 1.0008;
    ballSpeedY *= 1.0008;

    // Boundaries
    playerY = Math.max(0, Math.min(canvas.height - paddleHeight, playerY));
    cpuY = Math.max(0, Math.min(canvas.height - paddleHeight, cpuY));

    // Win/Lose at 7 points
    if (playerScore >= 7) endGame("🎉 You Win!");
    if (cpuScore >= 7) endGame("💀 You Lose!");
}

function endGame(text) {
    running = false;
    document.getElementById("message").innerText = text;
    document.getElementById("gameOverScreen").classList.remove("hidden");

    if (playerScore > highScore) {
        highScore = playerScore;
        localStorage.setItem("pongHighScore", highScore);
        document.getElementById("highScore").innerText = highScore;
    }
}

function loop() {
    if (!running) return;
    update();
    draw();
    requestAnimationFrame(loop);
}

// Keyboard controls
document.addEventListener("keydown", e => {
    if (e.key === "ArrowUp") up = true;
    if (e.key === "ArrowDown") down = true;
});

document.addEventListener("keyup", e => {
    if (e.key === "ArrowUp") up = false;
    if (e.key === "ArrowDown") down = false;
});

// Mobile controls
canvas.addEventListener("touchstart", e => {
    const y = e.touches[0].clientY;
    if (y < window.innerHeight / 2) up = true;
    else down = true;
});

canvas.addEventListener("touchend", () => {
    up = false;
    down = false;
});

// Responsive resize
window.addEventListener("resize", () => {
    canvas.width = window.innerWidth * 0.9;
    canvas.height = window.innerHeight * 0.72;
});
</script>

</body>
</html>
