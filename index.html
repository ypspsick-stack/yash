<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced Ping Pong</title>
<style>
body {
    margin: 0;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    font-family: Arial;
    text-align: center;
}

canvas {
    display: block;
    margin: auto;
    border: 3px solid white;
    box-shadow: 0 0 20px cyan;
}

#message {
    font-size: 24px;
    margin-top: 10px;
}
</style>
</head>

<body>

<h1>🏓 Advanced Ping Pong</h1>
<canvas id="gameCanvas"></canvas>
<div id="message"></div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// Responsive
canvas.width = window.innerWidth * 0.8;
canvas.height = window.innerHeight * 0.6;

// Paddle
const paddleWidth = 10;
const paddleHeight = 100;

// Player & CPU
let playerY = canvas.height/2 - paddleHeight/2;
let cpuY = canvas.height/2 - paddleHeight/2;

// Ball
let ballX = canvas.width/2;
let ballY = canvas.height/2;
let ballRadius = 8;
let ballSpeedX = 5;
let ballSpeedY = 4;

// Score
let playerScore = 0;
let cpuScore = 0;

// AI
let cpuSpeed = 0.08;

// Controls
let up = false, down = false;

// Sound
let bounceSound = new Audio("https://www.soundjay.com/button/beep-07.wav");

// Draw
function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // Ball trail
    ctx.fillStyle = "rgba(0,255,255,0.3)";
    ctx.beginPath();
    ctx.arc(ballX, ballY, ballRadius+4, 0, Math.PI*2);
    ctx.fill();

    // Ball
    ctx.fillStyle = "cyan";
    ctx.beginPath();
    ctx.arc(ballX, ballY, ballRadius, 0, Math.PI*2);
    ctx.fill();

    // Paddles
    ctx.fillStyle = "white";
    ctx.fillRect(0, playerY, paddleWidth, paddleHeight);
    ctx.fillRect(canvas.width-paddleWidth, cpuY, paddleWidth, paddleHeight);

    // Score
    ctx.font = "20px Arial";
    ctx.fillText(playerScore, canvas.width/4, 30);
    ctx.fillText(cpuScore, canvas.width*3/4, 30);
}

// Update
function update() {
    // Player
    if (up) playerY -= 6;
    if (down) playerY += 6;

    // Ball
    ballX += ballSpeedX;
    ballY += ballSpeedY;

    // Bounce walls
    if (ballY < 0 || ballY > canvas.height) {
        ballSpeedY *= -1;
        bounceSound.play();
    }

    // Paddle collision
    if (ballX < paddleWidth && ballY > playerY && ballY < playerY+paddleHeight) {
        ballSpeedX *= -1;
        bounceSound.play();
    }

    if (ballX > canvas.width-paddleWidth &&
        ballY > cpuY && ballY < cpuY+paddleHeight) {
        ballSpeedX *= -1;
        bounceSound.play();
    }

    // Score
    if (ballX < 0) {
        cpuScore++;
        reset();
    }
    if (ballX > canvas.width) {
        playerScore++;
        reset();
    }

    // Speed increase
    ballSpeedX *= 1.0005;
    ballSpeedY *= 1.0005;

    // AI
    cpuY += (ballY - (cpuY + paddleHeight/2)) * cpuSpeed;

    // Win
    if (playerScore === 5) {
        document.getElementById("message").innerText = "🎉 You Win!";
        stopGame();
    }
    if (cpuScore === 5) {
        document.getElementById("message").innerText = "💀 You Lose!";
        stopGame();
    }
}

// Reset
function reset() {
    ballX = canvas.width/2;
    ballY = canvas.height/2;
    ballSpeedX = -ballSpeedX;
}

// Controls
document.addEventListener("keydown", e => {
    if (e.key === "ArrowUp") up = true;
    if (e.key === "ArrowDown") down = true;
});
document.addEventListener("keyup", e => {
    if (e.key === "ArrowUp") up = false;
    if (e.key === "ArrowDown") down = false;
});

// Mobile touch
canvas.addEventListener("touchstart", e => {
    let y = e.touches[0].clientY;
    if (y < canvas.height/2) up = true;
    else down = true;
});
canvas.addEventListener("touchend", () => {
    up = false;
    down = false;
});

// Game loop
let running = true;
function loop() {
    if (!running) return;
    update();
    draw();
    requestAnimationFrame(loop);
}

function stopGame() {
    running = false;
}

loop();
</script>

</body>
</html>
