<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultimate Ping Pong</title>
<style>
body {
    margin: 0;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    font-family: Arial;
    text-align: center;
}

canvas {
    display: block;
    margin: auto;
    border: 3px solid white;
    box-shadow: 0 0 20px cyan;
}

#message {
    font-size: 24px;
    margin-top: 10px;
}

/* Restart Button */
#restartBtn {
    display: none;
    margin-top: 20px;
    padding: 12px 25px;
    font-size: 18px;
    background: cyan;
    color: black;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    box-shadow: 0 0 10px cyan;
}
</style>
</head>

<body>

<h1>🏓 Ultimate Ping Pong</h1>

<div>
    <label>Difficulty: </label>
    <select id="difficulty" onchange="setDifficulty()">
        <option value="easy">Easy</option>
        <option value="medium" selected>Medium</option>
        <option value="hard">Hard</option>
    </select>
</div>

<canvas id="gameCanvas"></canvas>

<div id="message"></div>
<button id="restartBtn" onclick="restartGame()">🔁 Restart Game</button>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// Responsive
canvas.width = window.innerWidth * 0.8;
canvas.height = window.innerHeight * 0.6;

// Paddle
const paddleWidth = 10;
const paddleHeight = 100;

// Player & CPU
let playerY, cpuY;

// Ball
let ballX, ballY;
let ballRadius = 8;
let ballSpeedX, ballSpeedY;

// Difficulty
let baseSpeedX = 5;
let baseSpeedY = 4;
let cpuSpeed = 0.08;

// Score
let playerScore, cpuScore;

// Controls
let up=false, down=false;

// Game state
let running = true;

// Sound
let bounceSound = new Audio("https://www.soundjay.com/button/beep-07.wav");

// Difficulty
function setDifficulty() {
    let level = document.getElementById("difficulty").value;

    if (level === "easy") {
        baseSpeedX = 3;
        baseSpeedY = 2;
        cpuSpeed = 0.05;
    } else if (level === "medium") {
        baseSpeedX = 5;
        baseSpeedY = 4;
        cpuSpeed = 0.08;
    } else {
        baseSpeedX = 7;
        baseSpeedY = 6;
        cpuSpeed = 0.15;
    }

    resetBall();
}

// Reset ball
function resetBall() {
    ballX = canvas.width/2;
    ballY = canvas.height/2;
    ballSpeedX = (Math.random()>0.5?1:-1)*baseSpeedX;
    ballSpeedY = baseSpeedY;
}

// Restart full game
function restartGame() {
    playerScore = 0;
    cpuScore = 0;
    playerY = canvas.height/2 - paddleHeight/2;
    cpuY = canvas.height/2 - paddleHeight/2;

    document.getElementById("message").innerText = "";
    document.getElementById("restartBtn").style.display = "none";

    running = true;
    resetBall();
    loop();
}

// Draw
function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // Ball trail
    ctx.fillStyle="rgba(0,255,255,0.3)";
    ctx.beginPath();
    ctx.arc(ballX,ballY,ballRadius+4,0,Math.PI*2);
    ctx.fill();

    // Ball
    ctx.fillStyle="cyan";
    ctx.beginPath();
    ctx.arc(ballX,ballY,ballRadius,0,Math.PI*2);
    ctx.fill();

    // Paddles
    ctx.fillStyle="white";
    ctx.fillRect(0,playerY,paddleWidth,paddleHeight);
    ctx.fillRect(canvas.width-paddleWidth,cpuY,paddleWidth,paddleHeight);

    // Score
    ctx.font="20px Arial";
    ctx.fillText(playerScore,canvas.width/4,30);
    ctx.fillText(cpuScore,canvas.width*3/4,30);
}

// Update
function update() {
    if(up) playerY-=6;
    if(down) playerY+=6;

    ballX+=ballSpeedX;
    ballY+=ballSpeedY;

    // Wall bounce
    if(ballY-ballRadius<0 || ballY+ballRadius>canvas.height){
        ballSpeedY*=-1;
        bounceSound.play();
    }

    // Player collision
    if(ballX-ballRadius<paddleWidth){
        if(ballY>playerY && ballY<playerY+paddleHeight){
            ballSpeedX*=-1;
            bounceSound.play();
        } else {
            cpuScore++;
            resetBall();
        }
    }

    // CPU collision
    if(ballX+ballRadius>canvas.width-paddleWidth){
        if(ballY>cpuY && ballY<cpuY+paddleHeight){
            ballSpeedX*=-1;
            bounceSound.play();
        } else {
            playerScore++;
            resetBall();
        }
    }

    // AI
    cpuY += (ballY-(cpuY+paddleHeight/2))*cpuSpeed;

    // Speed increase
    ballSpeedX *= 1.0005;
    ballSpeedY *= 1.0005;

    // Boundaries
    playerY=Math.max(0,Math.min(canvas.height-paddleHeight,playerY));
    cpuY=Math.max(0,Math.min(canvas.height-paddleHeight,cpuY));

    // Win condition
    if(playerScore===5){
        endGame("🎉 You Win!");
    }
    if(cpuScore===5){
        endGame("💀 You Lose!");
    }
}

// End game
function endGame(text){
    document.getElementById("message").innerText = text;
    document.getElementById("restartBtn").style.display = "inline-block";
    running = false;
}

// Controls
document.addEventListener("keydown",e=>{
    if(e.key==="ArrowUp") up=true;
    if(e.key==="ArrowDown") down=true;
});
document.addEventListener("keyup",e=>{
    if(e.key==="ArrowUp") up=false;
    if(e.key==="ArrowDown") down=false;
});

// Mobile
canvas.addEventListener("touchstart",e=>{
    let y=e.touches[0].clientY;
    if(y<canvas.height/2) up=true;
    else down=true;
});
canvas.addEventListener("touchend",()=>{
    up=false; down=false;
});

// Loop
function loop(){
    if(!running) return;
    update();
    draw();
    requestAnimationFrame(loop);
}

// Init
playerScore = 0;
cpuScore = 0;
playerY = canvas.height/2 - paddleHeight/2;
cpuY = canvas.height/2 - paddleHeight/2;

setDifficulty();
loop();
</script>

</body>
</html>
